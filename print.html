<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>世界杯小记者 · 打印版</title>
<style>
:root{--bg:#f0f4f0;--card:#fff;--primary:#0f6e56;--accent:#d4537e;--gold:#ef9f27;--text:#2c2c2a;--muted:#888780;--border:#d3d1c7}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:var(--bg);font-size:10px}
@media print{
  body{background:#fff}
  @page{size:A4;margin:5mm}
  .no-print{display:none}
}

/* Toolbar */
.no-print{text-align:center;padding:10px;background:var(--primary);color:#fff;margin-bottom:8px;border-radius:8px}
.no-print button{padding:9px 22px;border-radius:8px;border:none;background:var(--gold);color:#fff;font-size:14px;cursor:pointer;font-weight:700;margin:0 5px}
.no-print select{padding:7px 10px;border-radius:6px;border:1px solid #ccc;font-size:13px;margin:0 5px}

/* COVER — kept as-is */
.cover{text-align:center;padding:40px 20px 20px;page-break-after:always;background:#fff}
.cover .trophy{font-size:64px}
.cover h1{font-size:22px;margin:16px 0 8px;color:var(--primary)}
.cover .subtitle{font-size:13px;color:#666;margin-bottom:8px}
.cover .name-line{font-size:15px;margin-top:20px;padding:8px 20px;border:1px dashed #999;border-radius:6px;display:inline-block;min-width:160px}
.rules-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 16px;margin:14px auto 0;max-width:380px;text-align:left}
.rules-box h3{font-size:14px;margin-bottom:5px}
.rules-box .rule-line{font-size:11px;line-height:1.7}
.rules-box .pts{color:var(--primary);font-weight:600}

/* Stage sheet */
.card-sheet{page-break-before:always;padding-top:4px;background:#fff}
.card-sheet:first-of-type{page-break-before:auto}
.sheet-title{text-align:center;font-size:13px;font-weight:700;color:var(--primary);padding:6px 0 8px;letter-spacing:1px}
.sheet-title.ko{color:#993c1d}

/* Grid: 3 cols */
.card-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:2px}

/* Card */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:7px 6px;
  page-break-inside:avoid;
  display:flex;flex-direction:column;align-items:center;
}
.card.today{border-left:3px solid var(--gold)}

/* Stage tag */
.stage-tag{display:inline-block;font-size:7px;padding:1px 6px;border-radius:3px;font-weight:600;margin-bottom:4px;background:#e1f5ee;color:var(--primary)}
.stage-tag.ko{background:#faeee7;color:#993c1d}

/* Date */
.card-date{font-size:7.5px;color:var(--muted);margin-bottom:5px}

/* Teams */
.card-vs{display:flex;align-items:center;justify-content:center;gap:3px;margin-bottom:4px}
.card-team{text-align:center;flex:1;min-width:0}
.card-team .flag{font-size:22px;line-height:1}
.card-team .name{font-size:9px;font-weight:700;margin-top:1px;word-break:keep-all;line-height:1.2}
.card-vs-text{font-size:14px;font-weight:900;color:var(--border);flex-shrink:0;font-family:Georgia,serif}

/* Time */
.card-time{font-size:7.5px;color:var(--primary);margin-bottom:5px;font-weight:500}

/* Score for already-known results */
.card-result-known{font-size:13px;font-weight:700;color:var(--text);padding:4px 0;letter-spacing:1px;margin-bottom:3px}

/* Prediction */
.card-pred{border-top:1px solid #e8e6dc;padding-top:5px;width:100%}
.card-pred .guess-label{font-size:7px;color:var(--muted);text-align:center;margin-bottom:3px}
.pred-row{display:flex;gap:3px;justify-content:center}
.pred-item{text-align:center;flex:1;min-width:0}
.pred-item .circle{display:block;width:18px;height:18px;border:2px solid var(--primary);border-radius:50%;margin:0 auto 2px;background:#fff}
.pred-item .plabel{font-size:7.5px;font-weight:600;color:var(--text);line-height:1.1}
.pred-item .plabel.draw{color:#185fa5}

/* Result score fill */
.card-score{margin-top:3px;display:flex;align-items:center;gap:3px;justify-content:center;font-size:7px;color:var(--muted)}
.card-score .sbox{width:18px;height:14px;border:1px solid var(--border);border-radius:3px;background:var(--bg);text-align:center;line-height:14px;font-size:9px}

/* Number */
.card-num{font-size:6px;color:var(--border);margin-top:2px;letter-spacing:1px}

/* TBD card */
.card.tbd{opacity:.4}
.card.tbd .flag{filter:grayscale(1)}

/* Score filled card */
.card.scored .card-result-known{color:var(--text)}
.card.scored .card-pred{border-top-style:dashed}

@media print{
  .card-grid{gap:6px}
  .card{padding:6px 4px}
}
</style>
</head>
<body>

<div class="no-print">
  <p style="margin-bottom:10px;font-size:14px">🎫 <b>预测券 · 打印版</b></p>
  <select id="stageFilter" onchange="applyFilter()">
    <option value="upcoming" selected>待比赛（今起）</option>
    <option value="all">全部</option>
    <option value="group">仅小组赛</option>
    <option value="knockout">仅淘汰赛</option>
  </select>
  <button onclick="window.print()">🖨️ 打印</button>
  <p style="margin-top:6px;font-size:10px;opacity:.8">A4纸彩色打印 · 每页9张 · 沿边框剪开</p>
</div>

<!-- COVER -->
<div class="cover">
  <div class="trophy">🏆</div>
  <h1>世界杯小记者 · 2026</h1>
  <div class="subtitle">FIFA World Cup · Canada / Mexico / USA</div>
  <div class="subtitle">2026年6月11日 — 7月19日 · 48支球队 · 104场比赛</div>
  <div class="name-line">小记者：_______________</div>
  <div class="rules-box">
    <h3>📖 怎么玩？</h3>
    <div class="rule-line">1. 每场比赛开始前，圈一个「我猜」结果</div>
    <div class="rule-line">2. 赛后爸爸帮你录入手机，自动算分！</div>
    <div class="rule-line" style="margin-top:3px"><span class="pts">猜对胜负 +10</span>　<span class="pts">猜对平局 +15</span>　<span class="pts">猜错也有 +3</span></div>
  </div>
</div>

<div id="sheetsContainer"></div>

<script>
const STAGE_LABELS={group:'小组赛',round32:'1/16决赛',round16:'1/8决赛',quarter:'1/4决赛',semi:'半决赛',bronze:'三四名决赛','final':'决赛'};
const KO_STAGES=['round32','round16','quarter','semi','bronze','final'];

async function init(){
  const resp=await fetch('schedule.json');
  const data=await resp.json();
  renderCards(data.matchList,'upcoming');
}
init();

function applyFilter(){
  const filter=document.getElementById('stageFilter').value;
  fetch('schedule.json').then(r=>r.json()).then(d=>renderCards(d.matchList,filter));
}

function isPlaceholder(name){return /(?:第一|第二|3rd|^胜者|^负者)/.test(name)}

function renderCards(matches,filter){
  const today=new Date().toISOString().slice(0,10);
  let filtered=[...matches];

  if(filter==='upcoming') filtered=filtered.filter(m=>m.date>=today);
  else if(filter==='group') filtered=filtered.filter(m=>m.stage==='group'&&m.date>=today);
  else if(filter==='knockout') filtered=filtered.filter(m=>KO_STAGES.includes(m.stage)&&m.date>=today);

  const container=document.getElementById('sheetsContainer');
  let html='',currentStage='';

  filtered.forEach((m,i)=>{
    const mStage=STAGE_LABELS[m.stage]||m.stage;
    const isKO=KO_STAGES.includes(m.stage);
    const isTBD=isPlaceholder(m.home)||isPlaceholder(m.away);
    const hasScore=m.homeScore!==null&&m.awayScore!==null;

    if(m.stage!==currentStage){
      if(currentStage) html+=`</div></div>`;
      currentStage=m.stage;
      html+=`<div class="card-sheet"><div class="sheet-title${isKO?' ko':''}">${mStage}</div><div class="card-grid">`;
    }

    const d=new Date(m.date+'T12:00');
    const dow=['日','一','二','三','四','五','六'];
    const dateStr=(d.getMonth()+1)+'/'+d.getDate()+' 周'+dow[d.getDay()];
    const isToday=m.date===today;

    const shortHome=m.home.length>7?m.home.slice(0,6)+'…':m.home;
    const shortAway=m.away.length>7?m.away.slice(0,6)+'…':m.away;
    const hFlag=isTBD?'⚽':(m.homeFlag||'⚽');
    const aFlag=isTBD?'⚽':(m.awayFlag||'⚽');

    html+=`<div class="card${isToday?' today':''}${hasScore?' scored':''}${isTBD?' tbd':''}">`;
    html+=`<div class="stage-tag${isKO?' ko':''}">${mStage}</div>`;
    html+=`<div class="card-date">${dateStr}</div>`;

    html+=`<div class="card-vs">
      <div class="card-team"><div class="flag">${hFlag}</div><div class="name">${shortHome}</div></div>
      <div class="card-vs-text">VS</div>
      <div class="card-team"><div class="flag">${aFlag}</div><div class="name">${shortAway}</div></div>
    </div>`;

    html+=`<div class="card-time">🕐 ${m.time?m.time.slice(0,5):''}</div>`;

    if(hasScore){
      html+=`<div class="card-result-known">${m.homeScore} : ${m.awayScore}</div>`;
      html+=`<div style="font-size:7px;color:var(--muted);margin-bottom:2px">（已结束）</div>`;
    }

    if(!isTBD){
      html+=`<div class="card-pred">
        <div class="guess-label">✏️ 猜胜负</div>
        <div class="pred-row">
          <div class="pred-item"><span class="circle"></span><span class="plabel">${shortHome}赢</span></div>
          <div class="pred-item"><span class="circle"></span><span class="plabel draw">平局</span></div>
          <div class="pred-item"><span class="circle"></span><span class="plabel">${shortAway}赢</span></div>
        </div>
        ${!hasScore?`<div class="card-score"><span>比分</span><span class="sbox"></span><span>:</span><span class="sbox"></span></div>`:''}
      </div>`;
    }else{
      html+=`<div style="font-size:8px;color:var(--muted);padding:8px 0">对阵待定</div>`;
    }

    html+=`<div class="card-num">No.${String(i+1).padStart(3,'0')}</div></div>`;
  });

  if(currentStage) html+=`</div></div>`;
  if(filtered.length===0) html=`<div style="text-align:center;padding:60px;font-size:14px;color:var(--muted)">没有比赛啦 🎉</div>`;
  container.innerHTML=html;
}
</script>
</body>
</html>
