<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>世界杯小记者 2026</title>
<style>
:root{
  --bg:#f0f4f0;--card:#fff;--primary:#0f6e56;--accent:#d4537e;
  --gold:#ef9f27;--text:#2c2c2a;--muted:#888780;--border:#d3d1c7;
  --win:#0f6e56;--lose:#a32d2d;--draw:#185fa5;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.header{background:var(--primary);color:#fff;padding:14px 16px 10px;position:sticky;top:0;z-index:100}
.header h1{font-size:17px;font-weight:600;display:flex;align-items:center;gap:8px}
.header .score-badge{background:var(--gold);color:#fff;font-size:12px;padding:3px 10px;border-radius:10px;margin-left:auto;font-weight:600}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:99}
.tab{flex:1;text-align:center;padding:12px 0;font-size:14px;font-weight:500;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.filter-bar{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;background:var(--bg)}
.filter-btn{padding:6px 14px;border-radius:16px;border:1px solid var(--border);background:var(--card);font-size:13px;white-space:nowrap;cursor:pointer;color:var(--text)}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

.match-card{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border)}
.match-card.today{border-left:3px solid var(--gold)}
.stage-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:#e1f5ee;color:var(--win)}
.stage-tag.ko{background:#faeee7;color:#993c1d}
.match-teams{display:flex;align-items:center;justify-content:space-between;margin:8px 0}
.team{text-align:center;flex:1}
.team .flag{font-size:28px;margin-bottom:4px}
.team .name{font-size:13px;font-weight:500}
.team .name.small{font-size:11px;color:var(--muted)}
.vs-area{text-align:center;min-width:60px}
.vs-area .score{font-size:20px;font-weight:700;letter-spacing:2px}
.vs-area .score.null{font-size:14px;color:var(--muted);font-weight:400}
.vs-area .time{font-size:11px;color:var(--primary);margin-top:2px}

.prediction-row{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.prediction-row.done{background:#f8faf8;border-radius:8px;padding:10px}
.pred-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.pred-value{font-size:13px;font-weight:600}
.pred-value.win{color:var(--win)}.pred-value.draw{color:var(--draw)}.pred-value.lose{color:var(--lose)}
.pred-actions{display:flex;gap:8px;flex:1}
.pred-btn{flex:1;padding:12px 6px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center}
.pred-btn:active{transform:scale(.96)}
.pred-btn.selected{border-color:var(--primary);background:#e1f5ee;color:var(--primary)}
.result-row{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.result-row input{width:44px;height:36px;text-align:center;font-size:18px;font-weight:600;border:1px solid var(--border);border-radius:8px;background:var(--bg)}
.result-row .save-btn{flex:1;padding:10px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-size:14px;font-weight:500;cursor:pointer}

.stats-panel{padding:16px}
.stat-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border-radius:12px;padding:16px;text-align:center;border:1px solid var(--border)}
.stat-card .num{font-size:28px;font-weight:700;color:var(--primary)}
.stat-card .num.gold{color:var(--gold)}
.stat-card .label{font-size:12px;color:var(--muted);margin-top:4px}

.progress-bar{margin-bottom:20px;background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--border)}

.activity-feed{background:var(--card);border-radius:12px;padding:16px 0;border:1px solid var(--border);margin-bottom:16px}
.activity-feed h3{font-size:14px;margin:0 16px 12px;color:var(--text)}
.activity-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);font-size:12px}
.activity-item:last-child{border-bottom:none}
.activity-item .act-icon{font-size:16px;min-width:20px;text-align:center}
.activity-item .act-text{flex:1;line-height:1.5}
.activity-item .act-date{font-size:10px;color:var(--muted);white-space:nowrap}
.activity-item.good .act-text{color:var(--win)}
.activity-item.badge .act-text{color:var(--gold)}
.activity-empty{text-align:center;padding:20px;color:var(--muted);font-size:13px}

.badges{margin-top:16px}
.badges h3{font-size:15px;margin-bottom:12px}
.badge-grid{display:flex;flex-wrap:wrap;gap:8px}
.badge{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid var(--border)}
.badge.earned{background:#e1f5ee;border-color:#9fe1cb;color:var(--win)}
.badge.locked{background:var(--bg);color:var(--muted);opacity:.5}
.badge.new-badge{animation:pulse .6s ease 3}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

.date-header{padding:16px 4px 8px;font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.date-header .today-tag{background:var(--gold);color:#fff;font-size:10px;padding:2px 8px;border-radius:8px}
.date-header .tomorrow-tag{background:var(--draw);color:#fff;font-size:10px;padding:2px 8px;border-radius:8px}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .emoji{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--primary);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:300;animation:fadeIn .3s ease;pointer-events:none}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.celebration{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:250}
.confetti{position:absolute;width:8px;height:8px;border-radius:2px;animation:fall 2s ease-out forwards}
@keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

@media (min-width:768px){body{max-width:480px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border)}}
</style>
</head>

  try{const d=JSON.parse(localStorage.getItem(DATA_KEY));return d&&d.predictions?d:{predictions:{},results:{},history:[]}}catch(e){return{predictions:{},results:{},history:[]}}
}
function saveData(d){localStorage.setItem(DATA_KEY,JSON.stringify(d))}
let appData=loadData();
let scheduleData=[];

const STAGE_LABELS={group:'小组赛',round32:'1/16决赛',round16:'1/8决赛',quarter:'1/4决赛',semi:'半决赛',bronze:'三四名决赛','final':'决赛'};
const KO_STAGES=['round32','round16','quarter','semi','bronze','final'];

function init(){
  try{
    scheduleData=SCHEDULE_EMBED.matchList;
    console.log('Loaded embedded schedule, '+scheduleData.length+' matches');
  }catch(e){
    document.getElementById('contentArea').innerHTML='<div class="empty-state"><div class="emoji">😵</div><p>赛程加载失败，请刷新页面</p></div>';
    return;
  }
  scheduleData.sort((a,b)=>a.date+b.time>b.date+b.time?1:-1);
  syncResults();
  updateTotalScore();
  renderMatches();
}

window.addEventListener('DOMContentLoaded',init);

function fmtDate(d){const m=parseInt(d.split('-')[1]),day=parseInt(d.split('-')[2]);return m+'月'+day+'日'}
function hasResult(m){return m.homeScore!==null&&m.awayScore!==null}
function getPrediction(mid){return appData.predictions[mid]||null}
function getResult(mid){if(appData.results[mid])return appData.results[mid];const m=scheduleData.find(x=>x.id===mid);if(m&&m.homeScore!==null&&m.awayScore!==null)return{home:m.homeScore,away:m.awayScore};return null}
function calcPoints(mid){const p=getPrediction(mid),r=getResult(mid);if(!p||!r)return 0;const a=r.home>r.away?'home':r.home<r.away?'away':'draw';return p===a?(a==='draw'?15:10):3}
function stageClass(s){return KO_STAGES.includes(s)?'ko':''}
function todayStr(){const d=new Date();return d.toISOString().slice(0,10)}
function tomorrowStr(){const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10)}
function matchTimeKey(m){return m.date+'T'+m.time}
function isPlaceholder(name){return /第一|第二|3rd|^胜者|^负者/.test(name)}
function formatTBD(name){return name.replace(/([A-L])第一/,'$1 组第一').replace(/([A-L])第二/,'$1 组第二').replace(/^3rd$/,'小组第三')}

// --- HISTORY ---
function syncResults(){
  let changed=false;
  scheduleData.forEach(m=>{
    if(m.homeScore!==null&&m.awayScore!==null&&!appData.results[m.id]){
      appData.results[m.id]={home:m.homeScore,away:m.awayScore};
      changed=true;
      if(getPrediction(m.id)){ // only log history if user actually predicted
        const hName=isPlaceholder(m.home)?formatTBD(m.home):m.home;
        const aName=isPlaceholder(m.away)?formatTBD(m.away):m.away;
        const actual=m.homeScore>m.awayScore?'home':m.homeScore<m.awayScore?'away':'draw';
        const correct=getPrediction(m.id)===actual;
        addHistory('result',{mid:m.id,teams:hName+' vs '+aName,result:m.homeScore+':'+m.awayScore,pts:calcPoints(m.id),correct});
      }
    }
  });
  if(changed)saveData(appData);
}
function addHistory(type,data){
  appData.history.unshift({type,...data,ts:new Date().toISOString()});
  if(appData.history.length>100)appData.history.length=100;
  saveData(appData);
}
function checkNewBadges(oldPts,oldCorrect){
  const {totalCorrect,totalPts}=getStats();
  const badges=[];
  if(totalCorrect>=1&&oldCorrect<1)badges.push({name:'新手记者',icon:'🌱'});
  if(totalCorrect>=5&&oldCorrect<5)badges.push({name:'预测达人',icon:'🎯'});
  if(totalCorrect>=10&&oldCorrect<10)badges.push({name:'神算子',icon:'🔮'});
  if(totalCorrect>=20&&oldCorrect<20)badges.push({name:'预言大师',icon:'🧠'});
  if(totalPts>=200&&oldPts<200)badges.push({name:'满分记者',icon:'⭐'});
  if(totalPts>=500&&oldPts<500)badges.push({name:'超级记者',icon:'🌟'});
  return badges;
}

// --- RENDER: MATCHES ---
function renderMatches(filter='all'){
  const area=document.getElementById('contentArea');
  let matches=[...scheduleData];
  const today=todayStr(),tomorrow=tomorrowStr();

  if(filter==='all') matches=matches.filter(m=>m.date>=today&&m.homeScore===null);
  else if(filter==='group') matches=matches.filter(m=>m.stage==='group'&&m.date>=today&&m.homeScore===null);
  else if(filter==='ko') matches=matches.filter(m=>KO_STAGES.includes(m.stage)&&m.date>=today&&m.homeScore===null);
  else if(filter==='pending') matches=matches.filter(m=>m.date>=today&&!getPrediction(m.id)&&!getResult(m.id));
  else if(filter==='tomorrow') matches=matches.filter(m=>m.date===tomorrow);

  let html='',lastDate='';
  matches.forEach(m=>{
    const pred=getPrediction(m.id),result=getResult(m.id);
    const played=!!result||new Date(matchTimeKey(m))<new Date();
    const showPred=pred&&!result;
    const showRes=!!result;

    if(m.date!==lastDate){
      const isToday=m.date===today,isTomorrow=m.date===tomorrow;
      const d=new Date(m.date+'T12:00');
      const dow=['周日','周一','周二','周三','周四','周五','周六'];
      html+='<div class="date-header">'+fmtDate(m.date)+' '+dow[d.getDay()];
      if(isToday)html+='<span class="today-tag">今天</span>';
      else if(isTomorrow)html+='<span class="tomorrow-tag">明天</span>';
      html+='</div>';
      lastDate=m.date;
    }

    const isTBDHome=isPlaceholder(m.home),isTBDAway=isPlaceholder(m.away);
    const homeName=isTBDHome?formatTBD(m.home):(m.home.length>10?m.home.slice(0,9)+'…':m.home);
    const awayName=isTBDAway?formatTBD(m.away):(m.away.length>10?m.away.slice(0,9)+'…':m.away);
    const homeFlag=isTBDHome?'⚽':m.homeFlag;
    const awayFlag=isTBDAway?'⚽':m.awayFlag;
    const isToday=m.date===today;

    const scores=showRes?result:hasResult(m)?{home:m.homeScore,away:m.awayScore}:null;
    const scoreHtml=scores?`<div class="score">${scores.home} : ${scores.away}</div>`
      :`<div class="score null">vs</div><div class="time">${m.time}</div>`;

    let predHtml='';
    const labels={home:homeName+'赢',draw:'平局',away:awayName+'赢'};
    if(showPred){
      predHtml='<div class="prediction-row done"><div><div class="pred-label">我猜</div><div class="pred-value '+pred+'">'+labels[pred]+'</div></div></div>';
    }else if(showRes){
      const pts=calcPoints(m.id);
      const actual=scores.home>scores.away?'home':scores.home<scores.away?'away':'draw';
      const correct=pred===actual;
      predHtml='<div class="prediction-row done"><div><div class="pred-label">我猜</div><div class="pred-value '+(pred||'lose')+'">'+(pred?labels[pred]:'—')+'</div></div>'
        +(pred?`<div style="font-size:12px;color:${correct?'var(--win)':'var(--lose)'};font-weight:600;align-self:center">${correct?'✅':'❌'} +${pts}</div>`:'')+'</div>';
    }else if(!played){
      predHtml='<div class="prediction-row"><div class="pred-actions">'
        +'<button class="pred-btn" onclick="predict('+m.id+',\'home\')" style="flex:1.2">🏠 '+homeName+'赢</button>'
        +'<button class="pred-btn" onclick="predict('+m.id+',\'draw\')">🤝 平局</button>'
        +'<button class="pred-btn" onclick="predict('+m.id+',\'away\')" style="flex:1.2">'+awayName+'赢 🏠</button>'
        +'</div></div>';
    }

    let resultRow='';
    if(played&&!showRes&&!isPlaceholder(m.home)&&!isPlaceholder(m.away)){
      resultRow='<div class="result-row" id="result-'+m.id+'">'
        +'<span style="font-size:12px;color:var(--muted)">比分:</span>'
        +'<input type="number" id="hs-'+m.id+'" placeholder="?" min="0" max="20">'
        +'<span>:</span><input type="number" id="as-'+m.id+'" placeholder="?" min="0" max="20">'
        +'<button class="save-btn" onclick="saveResult('+m.id+')">记录</button></div>';
    }

    const stageInfo=STAGE_LABELS[m.stage]||m.stage;
    html+='<div class="match-card'+(isToday?' today':'')+'">'
      +'<div style="font-size:11px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px">'
      +'<span class="stage-tag '+stageClass(m.stage)+'">'+stageInfo+(m.group?' · '+m.group+'组':'')+'</span>'
      +(m.time?'<span>'+m.time+'</span>':'')+'</div>'
      +'<div class="match-teams">'
      +'<div class="team"><div class="flag">'+homeFlag+'</div><div class="name '+(m.home.length>10?'small':'')+'">'+homeName+'</div></div>'
      +'<div class="vs-area">'+scoreHtml+'</div>'
      +'<div class="team"><div class="flag">'+awayFlag+'</div><div class="name '+(m.away.length>10?'small':'')+'">'+awayName+'</div></div>'
      +'</div>'+predHtml+resultRow+'</div>';
  });

  if(matches.length===0)html='<div class="empty-state"><div class="emoji">🎉</div><p>没有找到比赛</p></div>';
  area.innerHTML=html;
}

// --- RENDER: STATS ---
function getStats(){
  let totalPred=0,totalVerified=0,totalCorrect=0,totalPts=0;
  scheduleData.forEach(m=>{
    const p=getPrediction(m.id),r=getResult(m.id);
    if(p)totalPred++;
    if(r&&p){totalVerified++;const a=r.home>r.away?'home':r.home<r.away?'draw':'draw';if(p===a)totalCorrect++;totalPts+=calcPoints(m.id);}
  });
  return{totalPred,totalVerified,totalCorrect,totalPts};
}

function renderStats(){
  const area=document.getElementById('contentArea');
  const {totalPred,totalVerified,totalCorrect,totalPts}=getStats();
  const accuracy=totalVerified>0?Math.round(totalCorrect/totalVerified*100):0;

  const badges=[
    {id:'newbie',name:'新手记者',icon:'🌱',desc:'完成第一次预测',earned:totalPred>=1},
    {id:'attendance',name:'全勤宝宝',icon:'📋',desc:'所有比赛都预测',earned:totalPred>=104},
    {id:'sharp5',name:'预测达人',icon:'🎯',desc:'猜对5场',earned:totalCorrect>=5},
    {id:'sharp10',name:'神算子',icon:'🔮',desc:'猜对10场',earned:totalCorrect>=10},
    {id:'sharp20',name:'预言大师',icon:'🧠',desc:'猜对20场',earned:totalCorrect>=20},
    {id:'champion',name:'冠军预言家',icon:'🏆',desc:'开赛前猜中冠军',earned:false},
    {id:'scribe',name:'勤笔头',icon:'📝',desc:'所有比赛都记录比分',earned:false},
    {id:'gold200',name:'满分记者',icon:'⭐',desc:'总分达到200',earned:totalPts>=200},
    {id:'gold500',name:'超级记者',icon:'🌟',desc:'总分达到500',earned:totalPts>=500},
  ];

  // Activity feed from history
  const recentBadgeNames=appData.history.filter(h=>h.type==='badge').map(h=>h.name);
  let actHtml='<div class="activity-feed"><h3>📋 近期动态</h3>';
  const recent=appData.history.slice(0,15);
  if(recent.length===0){
    actHtml+='<div class="activity-empty">还没有记录，开始预测吧！</div>';
  }else{
    recent.forEach(h=>{
      const d=new Date(h.ts);const ds=(d.getMonth()+1)+'/'+d.getDate();
      if(h.type==='predict'){
        actHtml+='<div class="activity-item"><span class="act-icon">🤔</span><span class="act-text">预测了 <b>'+h.teams+'</b>：'+h.choiceLabel+'</span><span class="act-date">'+ds+'</span></div>';
      }else if(h.type==='result'){
        actHtml+='<div class="activity-item good"><span class="act-icon">'+(h.correct?'✅':'💪')+'</span><span class="act-text"><b>'+h.teams+'</b> '+h.result+' | '+(h.correct?'猜对了！':'猜错了')+' <b>+'+h.pts+'分</b></span><span class="act-date">'+ds+'</span></div>';
      }else if(h.type==='badge'){
        actHtml+='<div class="activity-item badge"><span class="act-icon">'+h.icon+'</span><span class="act-text">获得了成就徽章 <b>「'+h.name+'」</b></span><span class="act-date">'+ds+'</span></div>';
      }
    });
  }
  actHtml+='</div>';

  let html='<div class="stats-panel"><div class="stat-cards">'
    +'<div class="stat-card"><div class="num">'+totalPred+'</div><div class="label">预测场次</div></div>'
    +'<div class="stat-card"><div class="num">'+totalCorrect+'</div><div class="label">猜对场次</div></div>'
    +'<div class="stat-card"><div class="num">'+accuracy+'%</div><div class="label">正确率</div></div>'
    +'<div class="stat-card"><div class="num gold">'+totalPts+'</div><div class="label">总积分</div></div>'
    +'</div>'
    +'<div class="progress-bar">'
    +'<div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px;color:var(--muted)"><span>预测进度</span><span>'+totalPred+'/104 场</span></div>'
    +'<div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden"><div style="height:100%;width:'+Math.round(totalPred/104*100)+'%;background:var(--primary);border-radius:4px;transition:width .5s"></div></div>'
    +'</div>'
    +actHtml
    +'<div class="badges"><h3>🏅 成就徽章</h3><div class="badge-grid">';
  badges.forEach(b=>{
    const isNew=recentBadgeNames.includes(b.name);
    html+='<div class="badge '+(b.earned?'earned':'locked')+(isNew?' new-badge':'')+'" title="'+b.desc+'"><span class="badge-icon">'+(b.earned?b.icon:'🔒')+'</span>'+b.name+'</div>';
  });
  html+='</div></div></div>';
  area.innerHTML=html;
  document.getElementById('filterBar').style.display='none';
}

// --- ACTIONS ---
function updateTotalScore(){
  let pts=0;scheduleData.forEach(m=>{pts+=calcPoints(m.id)});
  document.getElementById('totalScore').textContent='⭐ '+pts+'分';
}

function predict(mid,choice){
  if(getResult(mid)){toast('比赛已结束，无法预测');return}
  if(getPrediction(mid)){toast('已预测过');return}
  const m=scheduleData.find(x=>x.id===mid);
  appData.predictions[mid]=choice;
  const hName=isPlaceholder(m.home)?formatTBD(m.home):m.home;
  const aName=isPlaceholder(m.away)?formatTBD(m.away):m.away;
  const labels={home:hName+'赢',draw:'平局',away:aName+'赢'};
  addHistory('predict',{mid,choice,choiceLabel:labels[choice],teams:hName+' vs '+aName});
  saveData(appData);
  updateTotalScore();
  renderMatches(currentFilter);
  toast('预测成功！✅');
}

function saveResult(mid){
  const hs=parseInt(document.getElementById('hs-'+mid).value);
  const as=parseInt(document.getElementById('as-'+mid).value);
  if(isNaN(hs)||isNaN(as)){toast('请填写比分');return}
  const prevPts=getStats().totalPts;
  const prevCorrect=getStats().totalCorrect;
  appData.results[mid]={home:hs,away:as};
  saveData(appData);
  const pts=calcPoints(mid);
  updateTotalScore();
  const m=scheduleData.find(x=>x.id===mid);
  const hName=isPlaceholder(m.home)?formatTBD(m.home):m.home;
  const aName=isPlaceholder(m.away)?formatTBD(m.away):m.away;
  const actual=hs>as?'home':hs<as?'away':'draw';
  const pred=getPrediction(mid);
  const correct=pred===actual;
  addHistory('result',{mid,teams:hName+' vs '+aName,result:hs+':'+as,pts,correct});
  const newBadges=checkNewBadges(prevPts,prevCorrect);
  newBadges.forEach(b=>{addHistory('badge',{name:b.name,icon:b.icon})});
  if(pts>=10||newBadges.length>0)celebrate();
  renderMatches(currentFilter);
  let msg='比分已记录，+'+pts+'分';
  if(newBadges.length>0)msg+=' 🏅 获得「'+newBadges.map(b=>b.name).join('」「')+'」';
  toast(msg);
}

function toast(msg){
  const c=document.getElementById('toastContainer');
  const el=document.createElement('div');el.className='toast';el.textContent=msg;
  c.appendChild(el);setTimeout(()=>el.remove(),2500);
}

function celebrate(){
  const c=document.getElementById('celebrationContainer');
  const colors=['#ef9f27','#d4537e','#378add','#1d9e75','#534ab7','#d85a30'];
  for(let i=0;i<30;i++){
    const el=document.createElement('div');el.className='confetti';
    el.style.left=Math.random()*100+'%';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDelay=Math.random()*.5+'s';
    el.style.animationDuration=(1.5+Math.random()*1)+'s';
    c.appendChild(el);setTimeout(()=>el.remove(),2500);
  }
}

// --- TABS & FILTERS ---
let currentFilter='all';
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    currentFilter=this.dataset.filter;
    const tab=document.querySelector('.tab.active');
    if(tab&&tab.dataset.tab==='stats')return;
    renderMatches(currentFilter);
  });
});
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    this.classList.add('active');
    const t=this.dataset.tab;
    if(t==='matches'){document.getElementById('filterBar').style.display='flex';renderMatches(currentFilter)}
    else if(t==='predict'){document.getElementById('filterBar').style.display='flex';
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      document.querySelector('[data-filter="pending"]').classList.add('active');
      currentFilter='pending';renderMatches('pending');
    }
    else if(t==='stats'){renderStats()}
  });
});
</script>
